services:
  mongo:
    image: mongo:7.0
    container_name: chat_forge_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  whatsapp-service:
    build: .
    container_name: whatsapp_chat_forge
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URI: mongodb://mongo:27017/chatforge
    volumes:
      - ./storage/session:/usr/src/app/storage/session
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
    restart: always

volumes:
  mongo_data:
